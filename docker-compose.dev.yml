services:
  db:
    ports:
      - "5432:5432"
    volumes:
      - ~/Desktop/imdb:/backup/imdb:ro

  backend:
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"